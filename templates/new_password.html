<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body{
            overflow:hidden;
            background:linear-gradient(135deg,#2563eb,#7c3aed,#0ea5e9);
        }

        @keyframes float{
            0%{transform:translateY(0px);}
            50%{transform:translateY(-10px);}
            100%{transform:translateY(0px);}
        }

        .floating{
            animation:float 3s ease-in-out infinite;
        }

        .glass{
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255,0.18);
        }

        .card-3d{
            transition:all 0.4s ease;
            transform-style:preserve-3d;
        }

        .card-3d:hover{
            transform:rotateY(6deg) rotateX(4deg) scale(1.02);
            box-shadow:0 30px 40px rgba(0,0,0,0.35);
        }

        .otp-box{
            transition:0.3s;
        }

        .otp-box:focus{
            transform:scale(1.03);
        }

        .glow{
            box-shadow:0 0 25px rgba(139,92,246,0.6);
        }

        .circle{
            position:absolute;
            border-radius:50%;
            filter:blur(90px);
            opacity:0.3;
        }
    </style>
</head>

<body class="h-screen flex items-center justify-center relative text-white">

    <div class="circle bg-blue-400 w-96 h-96 top-0 left-0"></div>
    <div class="circle bg-purple-400 w-96 h-96 bottom-0 right-0"></div>

    <div class="glass card-3d p-10 rounded-3xl shadow-2xl w-[420px] text-center relative z-10">

        <div class="text-6xl mb-4 floating">
            🔐
        </div>

        <h2 class="text-4xl font-bold mb-3">
            Verify OTP
        </h2>

        <p class="text-purple-100 mb-8">
            Enter the OTP sent to your email
        </p>

        <form method="POST" action="/verify_otp" class="space-y-5">

            <input type="hidden" name="email" value="{{email}}">

            <input
                name="otp"
                type="text"
                placeholder="Enter OTP"
                required
                maxlength="6"
                class="otp-box w-full p-4 rounded-xl bg-white/90 text-black text-center tracking-[10px] text-2xl font-bold border-none outline-none shadow"
            >

            <button
                class="w-full bg-gradient-to-r from-purple-600 to-blue-500 text-white py-3 rounded-xl font-bold text-lg shadow-xl hover:scale-105 transition duration-300 glow"
            >
                🚀 Verify OTP
            </button>

        </form>

        <div class="flex items-center my-6">
            <div class="flex-1 h-px bg-purple-200"></div>
            <span class="px-3 text-purple-100 text-sm">
                Secure Verification
            </span>
            <div class="flex-1 h-px bg-purple-200"></div>
        </div>

        <div>
            <a href="/login"
               class="text-white hover:text-cyan-200 transition font-medium">
                ← Back to Login
            </a>
        </div>

    </div>

</body>
</html>
